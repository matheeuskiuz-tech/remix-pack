<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script src="https://fast.wistia.com/player.js" async></script>
    <script src="https://fast.wistia.com/embed/3zcl2t69mn.js" async type="module"></script>
    <style>
      wistia-player[media-id='3zcl2t69mn']:not(:defined) {
        background: center / contain no-repeat url('https://fast.wistia.com/embed/medias/3zcl2t69mn/swatch');
        display: block;
        filter: blur(5px);
        padding-top: 177.78%;
      }
    </style>
    <script>
      window._wq = window._wq || [];
      window._wq.push({
        id: "3zcl2t69mn",
        onReady: function(video) {
          video.bind('resume', function() {
            video.play();
          });
          video.bind('beforeseek', function() {
            return false;
          });
          video.bind('pause', function() {
            setTimeout(function() {
              video.play();
            }, 100);
          });
          video.playbar(false);
          video.volumeControl(false);
          video.fullscreenButton(false);
          video.settingsControl(false);
          video.captionsControl(false);
          video.play();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
